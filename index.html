<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chúc mừng 8/3</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
      }

      button {
        padding: 16px 32px;
        font-size: 20px;
        border: none;
        border-radius: 12px;
        background: #ff4081;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px pink;
      }

      #message {
        margin-top: 30px;
        font-size: 32px;
        color: #d81b60;
        display: none;
        text-align: center;
        animation: fadeIn 2s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .flower {
        position: absolute;
        top: -50px;
        font-size: 22px;
        animation: fall linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      .heart {
        position: absolute;
        font-size: 20px;
        animation: fly 4s linear forwards;
      }

      @keyframes fly {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(-300px);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <h1>🌸 Happy Women's Day 🌸</h1>

    <button onclick="start()">Nhấn để nhận lời chúc</button>

    <div id="message">
      💐Duy Anh chúc bạn ngày 8/3 thật nhiều niềm vui luôn xinh đẹp, hạnh phúc và thành
      công , gặp được nhiều may mắn💖
    </div>

    <audio id="music" autoplay loop>
      <source
        src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1d16dbe0f2.mp3"
      />
    </audio>

    <script>
      function start() {
        document.getElementById("message").style.display = "block";

        startFlowers();
        startHearts();
      }

      function startFlowers() {
        setInterval(() => {
          let flower = document.createElement("div");

          flower.classList.add("flower");
          flower.innerHTML = "🌸";

          flower.style.left = Math.random() * 100 + "vw";
          flower.style.animationDuration = 3 + Math.random() * 4 + "s";

          document.body.appendChild(flower);

          setTimeout(() => {
            flower.remove();
          }, 7000);
        }, 200);
      }

      function startHearts() {
        setInterval(() => {
          let heart = document.createElement("div");

          heart.classList.add("heart");
          heart.innerHTML = "💖";

          heart.style.left = 40 + Math.random() * 20 + "vw";

          document.body.appendChild(heart);

          setTimeout(() => {
            heart.remove();
          }, 4000);
        }, 500);
      }
    </script>
  </body>
</html>
